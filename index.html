<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Comunidade do Jota - Jogos do Dia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,900;1,900&display=swap');
    :root { --primary: #00ff88; --bg: #020202; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--bg); color: #fff; overflow-x: hidden; font-family: Arial, sans-serif; }
    .bg-lines {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 10% 100%; pointer-events: none;
    }
    .bg-lines::after {
      content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(0,255,136,0.1), transparent);
      animation: moveLines 6s linear infinite;
    }
    @keyframes moveLines { 0% { transform: translateY(0%); } 100% { transform: translateY(200%); } }
    .lp-wrapper {
      position: relative; z-index: 10; width: 100%;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: clamp(16px, 4vw, 40px) 0;
      background:
        radial-gradient(circle at center, rgba(2,2,2,0.4) 0%, var(--bg) 95%),
        url('https://raw.githubusercontent.com/JCPrime01/jp-api-hnc/main/jp-direto.jpg') center/cover no-repeat;
    }
    .header-section { width: 100%; text-align: center; }
    .section-label {
      font-size: clamp(10px, 2.5vw, 12px); text-transform: uppercase; color: var(--primary);
      letter-spacing: 4px; margin-bottom: 12px; font-weight: bold;
    }
    .carousel-container { display: flex; width: 100%; overflow: hidden; padding: 8px 0; }
    .carousel-track { display: flex; gap: 16px; animation: scroll 30s linear infinite; padding-left: 16px; }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .game-card {
      background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px); min-width: clamp(180px, 50vw, 220px); padding: 14px;
      border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; flex-shrink: 0;
    }
    .teams-row { display: flex; align-items: center; justify-content: space-around; gap: 8px; }
    .team { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .team img { width: clamp(32px, 8vw, 40px); height: clamp(32px, 8vw, 40px); object-fit: contain; }
    .team span { font-size: clamp(9px, 2.5vw, 11px); color: #ccc; }
    .vs { font-weight: 900; color: var(--primary); font-size: clamp(13px, 3.5vw, 16px); }
    .middle-section {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    .headline {
      font-family: 'Kanit', sans-serif;
      font-size: clamp(44px, 14vw, 72px);
      font-weight: 900; font-style: italic; text-transform: uppercase;
      line-height: 1; padding: 0 20px; text-align: center;
      text-shadow: 0 4px 20px rgba(0,0,0,0.9);
    }
    .footer-section { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 clamp(16px, 5vw, 20px); }
    .alert-box {
      width: 100%; max-width: 420px; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      padding: 12px 15px; margin-bottom: 10px; backdrop-filter: blur(10px);
    }
    .alert-box p { font-size: clamp(12px, 3vw, 14px); color: #fff; line-height: 1.4; text-align: center; }
    .btn-container { width: 100%; max-width: 420px; margin-bottom: 10px; animation: pulse 2s infinite ease-in-out; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    .btn-border-beam {
      position: relative; padding: 2px; border-radius: 18px; overflow: hidden;
      display: block; text-decoration: none; box-shadow: 0 0 20px rgba(0,136,204,0.5);
    }
    .btn-border-beam::before {
      content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(transparent, transparent, #0088cc, transparent);
      animation: rotate 3s linear infinite;
    }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .btn-content {
      position: relative; background: #0088cc; color: #fff;
      padding: clamp(16px, 4vw, 20px); border-radius: 16px;
      font-size: clamp(15px, 4vw, 18px); font-weight: 900; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 5;
    }
    .bateubet-footer { width: 100%; max-width: 420px; display: block; margin-top: 10px; }
  </style>
</head>
